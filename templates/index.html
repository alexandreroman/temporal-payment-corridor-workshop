<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Corridor</title>

    <!-- Favicon: the same border-crossing mark, inlined as an SVG data URI. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml,%3Csvg%20xmlns="http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg"%20viewBox="0%200%2064%2064"%20fill="none"%20stroke-linecap="round"%3E%3Cdefs%3E%3ClinearGradient%20id="g"%20x1="8"%20y1="56"%20x2="56"%20y2="8"%20gradientUnits="userSpaceOnUse"%3E%3Cstop%20stop-color="%236E56F8"%2F%3E%3Cstop%20offset="1"%20stop-color="%23B06CF9"%2F%3E%3C%2FlinearGradient%3E%3Cmarker%20id="a"%20markerWidth="5"%20markerHeight="5"%20refX="2.4"%20refY="2.5"%20orient="auto"%3E%3Cpath%20d="M0%200%20L5%202.5%20L0%205%20Z"%20fill="%23B06CF9"%2F%3E%3C%2Fmarker%3E%3C%2Fdefs%3E%3Crect%20x="22"%20y="14"%20width="5"%20height="36"%20rx="2.5"%20fill="url%28%23g%29"%20opacity=".45"%2F%3E%3Crect%20x="33"%20y="14"%20width="5"%20height="36"%20rx="2.5"%20fill="url%28%23g%29"%20opacity=".45"%2F%3E%3Cpath%20d="M12%2032%20H%2048"%20stroke="url%28%23g%29"%20stroke-width="4"%20marker-end="url%28%23a%29"%2F%3E%3C%2Fsvg%3E'
    />

    <!-- Tailwind CSS via CDN Play (no build step). -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter (Google Fonts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: { ink: '#141414', accent: '#7C5CFC' },
          },
        },
      };
    </script>

    <style>
      /* Subtle indigo -> violet mesh, layered over the near-black base. */
      .mesh {
        background-color: #141414;
        background-image:
          radial-gradient(60rem 60rem at 15% 12%, rgba(124, 92, 252, 0.22), transparent 60%),
          radial-gradient(50rem 50rem at 85% 20%, rgba(99, 102, 241, 0.18), transparent 55%),
          radial-gradient(55rem 55rem at 50% 100%, rgba(139, 92, 246, 0.16), transparent 60%);
      }
    </style>
  </head>

  <body class="mesh h-full font-sans text-white antialiased">
    <main class="flex min-h-full items-center justify-center px-6 py-20">
      <section class="flex max-w-2xl flex-col items-center text-center">
        <!-- Border-crossing mark: two faint bars (a border) crossed by an arrow. -->
        <svg
          class="mb-6 h-16 w-16"
          viewBox="0 0 64 64"
          fill="none"
          stroke-linecap="round"
          aria-hidden="true"
        >
          <defs>
            <linearGradient id="pc-logo-grad" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6E56F8" />
              <stop offset="1" stop-color="#B06CF9" />
            </linearGradient>
            <marker id="pc-logo-arrow" markerWidth="5" markerHeight="5" refX="2.4" refY="2.5" orient="auto">
              <path d="M0 0 L5 2.5 L0 5 Z" fill="#B06CF9" />
            </marker>
          </defs>
          <rect x="22" y="14" width="5" height="36" rx="2.5" fill="url(#pc-logo-grad)" opacity=".45" />
          <rect x="33" y="14" width="5" height="36" rx="2.5" fill="url(#pc-logo-grad)" opacity=".45" />
          <path d="M12 32 H 48" stroke="url(#pc-logo-grad)" stroke-width="4" marker-end="url(#pc-logo-arrow)" />
        </svg>

        <h1 class="text-5xl font-bold tracking-tight sm:text-6xl">Payment Corridor</h1>

        <!-- Accent rule under the title. -->
        <span class="mt-6 h-px w-16 bg-accent"></span>

        <p class="mt-6 max-w-lg text-lg leading-relaxed text-white/70">
          Repairing anomalous cross-border payments with durable Temporal workflows and AI agents.
        </p>
      </section>
    </main>
  </body>
</html>
