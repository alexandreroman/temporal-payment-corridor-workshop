<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Corridor</title>

    <!-- Favicon: the same border-crossing mark, shared from /static/logo.svg. -->
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />

    <!-- Tailwind CSS via CDN Play (no build step). -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter (Google Fonts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: { ink: '#141414', accent: '#7C5CFC' },
            // Subtle indigo -> violet mesh, layered over the near-black base.
            // Moved from a <style> block into Tailwind config so the page stays
            // strictly utility classes: `bg-ink bg-mesh` below.
            backgroundImage: {
              mesh:
                'radial-gradient(60rem 60rem at 15% 12%, rgba(124, 92, 252, 0.22), transparent 60%),' +
                'radial-gradient(50rem 50rem at 85% 20%, rgba(99, 102, 241, 0.18), transparent 55%),' +
                'radial-gradient(55rem 55rem at 50% 100%, rgba(139, 92, 246, 0.16), transparent 60%)',
            },
          },
        },
      };
    </script>

    <!-- Alpine.js via CDN (no build step); `defer` runs it after DOM parsing,
         and Alpine auto-calls a data object's `init()` once attached below. -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>

  <body class="min-h-full bg-ink bg-mesh font-sans text-white antialiased" x-data="corridor()">
    <div class="mx-auto max-w-4xl px-6 py-12">
      <!-- Header -->
      <header class="flex items-center gap-4">
        <svg viewBox="0 0 24 24" class="h-11 w-11" fill="none" stroke="#7C5CFC" stroke-width="1.5">
          <path d="M3 8h18M3 16h18" opacity="0.4" />
          <path d="M6 4l12 16M6 20L18 4" opacity="0.9" stroke-linecap="round" />
        </svg>
        <div>
          <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight">Payment Corridor</h1>
            <div class="flex items-center gap-2 text-xs text-white/40">
              <span>powered by</span>
              <img src="/static/temporal-logo.png" alt="Temporal" class="h-7 w-auto opacity-80" />
            </div>
          </div>
          <p class="text-sm text-white/60">
            Anomalous cross-border payments, repaired by durable AI agents.
          </p>
        </div>
      </header>

      <!-- List heading -->
      <div class="mb-4 mt-10 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-white/50">
          Payment anomalies
          <span class="ml-1 text-white/30" x-text="`· ${anomalies.length}`"></span>
        </h2>
      </div>

      <!-- Inline error state: the payments API is unreachable. refresh() keeps
           retrying every 3s, so this clears itself as soon as it responds. -->
      <p
        x-show="error"
        class="rounded-xl border border-red-400/30 bg-red-400/10 px-5 py-4 text-sm text-red-300"
      >
        Corrections unavailable — retrying every 3s.
      </p>

      <!-- Empty state -->
      <p
        x-show="!error && anomalies.length === 0"
        class="rounded-xl border border-white/10 bg-white/[0.03] px-5 py-4 text-sm text-white/50"
      >
        No payment anomalies yet.
      </p>

      <ul class="space-y-3" x-show="!error && anomalies.length > 0">
        <template x-for="a in anomalies" :key="a.payment_id">
          <li class="rounded-xl border border-white/10 bg-white/[0.03]">
            <div class="flex items-center gap-4 px-5 py-4">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-3">
                  <span class="font-mono text-sm text-white/90" x-text="a.payment_id"></span>
                  <span class="rounded-md px-2 py-0.5 text-xs font-medium ring-1" :class="badge(a.status)">
                    <!-- Only the in-flight `processing` status pulses; every
                         other status (awaiting-approval, applied, held,
                         failed, ...) shows the plain status text. -->
                    <span
                      x-show="a.status === 'processing'"
                      class="mr-1 inline-block h-1.5 w-1.5 rounded-full bg-accent animate-pulse"
                    ></span>
                    <span x-text="a.status"></span>
                  </span>
                </div>
                <div class="mt-1 flex items-center gap-3 text-xs text-white/50">
                  <span class="text-white/70" x-text="a.corridor.replace('->', ' → ')"></span>
                  <span class="font-mono" x-text="a.anomaly_type"></span>
                  <span>·</span>
                  <span x-text="ago(a.start_time)"></span>
                  <!-- The human-approval intervention panel for an
                       awaiting-approval row lands in a later step; this task
                       only renders the status badge. -->
                  <span x-show="a.outcome_summary" x-text="'· ' + a.outcome_summary"></span>
                </div>
              </div>
            </div>
          </li>
        </template>
      </ul>

      <p class="mt-8 text-center text-xs text-white/30">
        Newest first · running corrections + recent history · list re-fetched every 3s via webui → payments API
      </p>
    </div>

    <script>
      // Alpine component for the homepage root (`x-data="corridor()"` above).
      // NOTE: The browser calls the payments API same-origin, through the
      // gateway that fronts both webui and the API on one port — webui itself
      // never proxies this request, so no httpx/PAYMENTS_API_* config lives
      // server-side. Source: docs/superpowers/specs (gateway topology).
      function corridor() {
        return {
          anomalies: [],
          error: false,

          async refresh() {
            try {
              const response = await fetch("/api/payments/v1/anomalies");
              if (!response.ok) throw new Error(response.status);
              this.anomalies = await response.json();
              this.error = false;
            } catch (e) {
              this.error = true;
            }
          },

          init() {
            this.refresh();
            setInterval(() => this.refresh(), 3000);
          },

          // Maps a row's status to the Tailwind classes for its badge pill.
          // Unrecognized statuses (e.g. canceled, terminated, timed-out) fall
          // back to the same neutral treatment as "held".
          badge(status) {
            const palette = {
              "awaiting-approval": "bg-amber-400/15 text-amber-300 ring-amber-400/30",
              processing: "bg-accent/15 text-accent ring-accent/30",
              applied: "bg-emerald-400/15 text-emerald-300 ring-emerald-400/30",
              held: "bg-white/10 text-white/70 ring-white/15",
              failed: "bg-red-400/15 text-red-300 ring-red-400/30",
            };
            return palette[status] || "bg-white/10 text-white/70 ring-white/15";
          },

          // Relative time since `start_time`, e.g. "8s ago" / "3m ago".
          ago(iso) {
            const seconds = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
            if (seconds < 60) return `${seconds}s ago`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
          },
        };
      }
    </script>
  </body>
</html>
