<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Corridor</title>

    <!-- Favicon: the same border-crossing mark, shared from /static/logo.svg. -->
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />

    <!-- Tailwind CSS via CDN Play (no build step). -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter (Google Fonts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: { ink: '#141414', accent: '#7C5CFC' },
          },
        },
      };
    </script>

    <style>
      /* Subtle indigo -> violet mesh, layered over the near-black base. */
      .mesh {
        background-color: #141414;
        background-image:
          radial-gradient(60rem 60rem at 15% 12%, rgba(124, 92, 252, 0.22), transparent 60%),
          radial-gradient(50rem 50rem at 85% 20%, rgba(99, 102, 241, 0.18), transparent 55%),
          radial-gradient(55rem 55rem at 50% 100%, rgba(139, 92, 246, 0.16), transparent 60%);
      }
    </style>
  </head>

  <body class="mesh h-full font-sans text-white antialiased">
    <main class="flex min-h-full items-center justify-center px-6 py-20">
      <section class="flex max-w-2xl flex-col items-center text-center">
        <!-- Border-crossing mark (shared from /static/logo.svg): two faint bars crossed by an arrow. -->
        <!-- Decorative only, so the empty alt keeps it out of the accessibility tree. -->
        <img src="/static/logo.svg" alt="" class="mb-6 h-16 w-16" />

        <h1 class="text-5xl font-bold tracking-tight sm:text-6xl">Payment Corridor</h1>

        <!-- Accent rule under the title. -->
        <span class="mt-6 h-px w-16 bg-accent"></span>

        <p class="mt-6 max-w-lg text-lg leading-relaxed text-white/70">
          Repairing anomalous cross-border payments with durable Temporal workflows and AI agents.
        </p>
      </section>
    </main>
  </body>
</html>
