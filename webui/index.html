<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Corridor</title>

    <!-- Favicon: the same border-crossing mark, shared from /static/logo.svg. -->
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />

    <!-- Tailwind CSS via CDN Play (no build step). -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter (Google Fonts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: { ink: '#141414', accent: '#7C5CFC' },
            // Subtle indigo -> violet mesh, layered over the near-black base.
            // Moved from a <style> block into Tailwind config so the page stays
            // strictly utility classes: `bg-ink bg-mesh` below.
            backgroundImage: {
              mesh:
                'radial-gradient(60rem 60rem at 15% 12%, rgba(124, 92, 252, 0.22), transparent 60%),' +
                'radial-gradient(50rem 50rem at 85% 20%, rgba(99, 102, 241, 0.18), transparent 55%),' +
                'radial-gradient(55rem 55rem at 50% 100%, rgba(139, 92, 246, 0.16), transparent 60%)',
            },
          },
        },
      };
    </script>

    <!-- Alpine.js via CDN (no build step); `defer` runs it after DOM parsing,
         and Alpine auto-calls a data object's `init()` once attached below. -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>

  <body class="min-h-full bg-ink bg-mesh font-sans text-white antialiased" x-data="corridor()">
    <div class="mx-auto max-w-4xl px-6 py-12">
      <!-- Header -->
      <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <!-- Brand: the border-crossing mark, wordmark, and tagline as one group. -->
        <div class="flex min-w-0 items-center gap-4">
          <!-- The app's border-crossing mark, shared from /static/logo.svg (same asset as the favicon). -->
          <!-- Decorative only: the empty alt keeps it out of the accessibility tree (the h1 names the app). -->
          <img src="/static/logo.svg" alt="" class="h-11 w-11 shrink-0" />
          <div class="min-w-0">
            <h1 class="text-2xl font-bold tracking-tight">Payment Corridor</h1>
            <p class="mt-0.5 truncate text-sm text-white/60">
              Anomalous cross-border payments, repaired by durable AI agents.
            </p>
          </div>
        </div>
        <!-- Attribution, pushed to the trailing edge of the masthead. -->
        <div class="hidden shrink-0 items-center gap-2 text-xs text-white/40 md:flex md:translate-y-1.5 md:self-end">
          <span>powered by</span>
          <img src="/static/temporal-logo.png" alt="Temporal" class="h-7 w-auto opacity-80" />
        </div>
      </header>

      <!-- List heading -->
      <div class="mb-4 mt-10 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-white/50">
          Payment anomalies:
          <span class="text-white/30" x-text="anomalies.length"></span>
        </h2>
      </div>

      <!-- Inline error state: the payments API is unreachable. refresh() keeps
           retrying every 3s, so this clears itself as soon as it responds. -->
      <p
        x-show="error"
        class="rounded-xl border border-red-400/30 bg-red-400/10 px-5 py-4 text-sm text-red-300"
      >
        Corrections unavailable — retrying every 3s.
      </p>

      <!-- Empty state -->
      <p
        x-show="!error && anomalies.length === 0"
        class="rounded-xl border border-white/10 bg-white/[0.03] px-5 py-4 text-sm text-white/50"
      >
        No payment anomalies yet.
      </p>

      <ul class="space-y-3" x-show="!error && anomalies.length > 0">
        <template x-for="a in anomalies" :key="a.payment_id">
          <li class="rounded-xl border border-white/10 bg-white/[0.03]">
            <div class="flex items-center gap-4 px-5 py-4">
              <div class="min-w-0 flex-1">
                <div class="flex items-center justify-between gap-3">
                  <div class="flex min-w-0 items-center gap-2">
                    <span class="font-mono text-sm text-white/90" x-text="a.payment_id"></span>
                    <span class="text-white/30">•</span>
                    <span class="shrink-0 text-xs text-white/50" x-text="ago(a.start_time)"></span>
                  </div>
                  <span class="shrink-0 rounded-md px-2 py-0.5 text-xs font-medium ring-1" :class="badge(a.status)">
                    <!-- Only the in-flight `processing` status pulses; every
                         other status (awaiting-approval, applied, held,
                         failed, ...) shows the plain status text. -->
                    <span
                      x-show="a.status === 'processing'"
                      class="mr-1 inline-block h-1.5 w-1.5 rounded-full bg-accent animate-pulse"
                    ></span>
                    <span x-text="a.status"></span>
                  </span>
                </div>
                <p x-show="a.amount != null" class="mt-1 truncate text-xs text-white/50">
                  Payment:
                  <span
                    class="font-semibold text-white/80"
                    x-text="a.amount != null ? `${a.amount.toLocaleString()} ${a.currency}` : ''"
                  ></span>
                  to
                  <span class="font-semibold text-white/80" x-text="a.beneficiary"></span>
                </p>
                <div class="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-white/50">
                  <span class="text-white/70" x-text="a.corridor.replace('->', ' → ')"></span>
                  <span class="font-mono" x-text="a.anomaly_type"></span>
                  <!-- Received (anomalous) fields, so the reader sees why it was
                       flagged; the beneficiary key is dropped (shown above). -->
                  <template
                    x-for="entry in Object.entries(a.details || {}).filter((e) => e[0] !== 'beneficiary')"
                    :key="entry[0]"
                  >
                    <span>
                      <span class="text-white/40" x-text="entry[0] + ':'"></span>
                      <span class="font-mono text-white/70" x-text="entry[1]"></span>
                    </span>
                  </template>
                </div>
                <!-- Outcome summary on its own line: a held/rejected reason can run
                     long, so clamp to 2 lines with a Show more/less toggle that only
                     appears when the text actually overflows the clamp. -->
                <div x-show="a.outcome_summary" class="mt-1">
                  <p
                    class="text-xs leading-relaxed text-white/40"
                    :class="!a.outcomeExpanded && 'line-clamp-2'"
                    x-text="outcomeText(a)"
                  ></p>
                  <button
                    type="button"
                    x-show="a.outcomeExpanded || outcomeClamped($el)"
                    @click="a.outcomeExpanded = !a.outcomeExpanded"
                    class="mt-2 ml-auto block w-fit text-xs font-medium text-gray-400 hover:text-gray-300"
                    x-text="a.outcomeExpanded ? 'Show less' : 'Show more'"
                  ></button>
                </div>
              </div>
            </div>

            <!-- The human-approval intervention panel. It only ever renders
                 for a row whose status is "awaiting-approval", and that
                 status only exists once the human-approval-signal FEATURE is
                 enabled (payments/workflows.py) — so this whole block stays
                 dormant while the workshop feature is off. -->
            <div
              x-show="a.status === 'awaiting-approval'"
              class="border-t border-white/10 bg-white/[0.02] px-5 py-4"
            >
              <template x-if="a.review">
                <div class="grid items-stretch gap-4 sm:grid-cols-2">
                  <!-- Proposed correction -->
                  <div class="flex flex-col rounded-lg border border-white/10 p-3">
                    <p class="text-xs uppercase tracking-wide text-white/40">Proposed correction</p>
                    <dl class="mt-2 grid grid-cols-[auto_1fr] gap-x-3 gap-y-0.5 text-sm">
                      <dt class="text-white/40">field</dt>
                      <dd class="font-mono" x-text="a.review.proposal.field_to_fix"></dd>
                      <dt class="text-white/40">value</dt>
                      <dd class="font-mono">
                        <template x-if="a.anomaly && a.anomaly.details[a.review.proposal.field_to_fix]">
                          <span class="text-white/40" x-text="a.anomaly.details[a.review.proposal.field_to_fix] + ' → '"></span>
                        </template>
                        <span class="text-accent" x-text="a.review.proposal.proposed_value"></span>
                      </dd>
                    </dl>
                    <!-- Rationale is unbounded LLM prose, so clamp it by default and
                         let the reviewer expand on demand — keeps the card compact. -->
                    <div class="mt-3">
                      <p class="text-xs uppercase tracking-wide text-white/30">Rationale</p>
                      <p
                        class="mt-0.5 text-xs leading-relaxed text-white/60"
                        :class="!a.rationaleExpanded && 'line-clamp-3'"
                        x-text="a.review.proposal.rationale"
                      ></p>
                      <button
                        type="button"
                        x-show="(a.review.proposal.rationale || '').length > 160"
                        @click="a.rationaleExpanded = !a.rationaleExpanded"
                        class="mt-2 ml-auto block w-fit text-xs font-medium text-gray-400 hover:text-gray-300"
                        x-text="a.rationaleExpanded ? 'Show less' : 'Show more'"
                      ></button>
                    </div>
                    <div class="mt-auto flex items-center gap-2 pt-3 text-xs">
                      <span
                        class="rounded bg-white/10 px-1.5 py-0.5 text-white/60"
                        x-text="`source ${a.review.proposal.source}`"
                      ></span>
                      <span
                        class="rounded bg-white/10 px-1.5 py-0.5 text-white/60"
                        x-text="`confidence ${a.review.proposal.confidence}`"
                      ></span>
                    </div>
                  </div>

                  <!-- Compliance verdict -->
                  <div class="flex flex-col rounded-lg border border-white/10 p-3">
                    <p class="text-xs uppercase tracking-wide text-white/40">Compliance verdict</p>
                    <template x-if="a.review.verdict">
                      <div class="flex flex-1 flex-col">
                        <!-- Status shown as an icon chip + label, never a bare glyph
                             inline with the reason text. -->
                        <div class="mt-2 flex items-center gap-2">
                          <span
                            class="flex h-5 w-5 shrink-0 items-center justify-center rounded-full"
                            :class="a.review.verdict.compliant ? 'bg-emerald-500/15 text-emerald-300' : 'bg-red-500/15 text-red-300'"
                          >
                            <svg x-show="a.review.verdict.compliant" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M16.7 5.3a1 1 0 0 1 0 1.4l-7.5 7.5a1 1 0 0 1-1.4 0L3.3 9.7a1 1 0 1 1 1.4-1.4l3.3 3.29 6.8-6.79a1 1 0 0 1 1.4 0Z" clip-rule="evenodd" /></svg>
                            <svg x-show="!a.review.verdict.compliant" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M8.26 2.83a2 2 0 0 1 3.48 0l6.5 11.5A2 2 0 0 1 16.5 17.3h-13A2 2 0 0 1 1.76 14.33l6.5-11.5ZM10 7a1 1 0 0 0-1 1v3a1 1 0 1 0 2 0V8a1 1 0 0 0-1-1Zm0 7.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" /></svg>
                          </span>
                          <span
                            class="text-sm font-medium"
                            :class="a.review.verdict.compliant ? 'text-emerald-300' : 'text-red-300'"
                            x-text="a.review.verdict.compliant ? 'Compliant — no violations' : 'Not compliant'"
                          ></span>
                        </div>
                        <!-- Each violation on its own line instead of one comma-joined run-on. -->
                        <ul
                          x-show="!a.review.verdict.compliant"
                          class="mt-2 space-y-1.5"
                          :class="!a.verdictExpanded && 'max-h-16 overflow-hidden'"
                        >
                          <template x-for="(v, i) in a.review.verdict.violations" :key="i">
                            <li class="flex gap-2 text-xs leading-relaxed text-red-200/80">
                              <span class="mt-1.5 h-1 w-1 shrink-0 rounded-full bg-red-400/70"></span>
                              <span x-text="v"></span>
                            </li>
                          </template>
                        </ul>
                        <!-- Compliance reasons can run long; clamp like the rationale
                             and let the reviewer expand on demand. -->
                        <button
                          type="button"
                          x-show="!a.review.verdict.compliant && a.review.verdict.violations.join(' ').length > 160"
                          @click="a.verdictExpanded = !a.verdictExpanded"
                          class="mt-2 ml-auto block w-fit text-xs font-medium text-gray-400 hover:text-gray-300"
                          x-text="a.verdictExpanded ? 'Show less' : 'Show more'"
                        ></button>
                        <div class="mt-auto flex items-center gap-2 pt-3 text-xs">
                          <span
                            class="rounded bg-white/10 px-1.5 py-0.5 text-white/60"
                            x-text="`source ${a.review.verdict.source}`"
                          ></span>
                          <span
                            class="rounded bg-white/10 px-1.5 py-0.5 text-white/60"
                            x-text="`confidence ${a.review.verdict.confidence}`"
                          ></span>
                        </div>
                      </div>
                    </template>
                    <template x-if="!a.review.verdict">
                      <p class="mt-2 text-xs text-white/40">No compliance verdict yet.</p>
                    </template>
                  </div>
                </div>
              </template>

              <div class="mt-4 flex flex-wrap items-end gap-3">
                <label class="text-xs text-white/50">
                  Approver
                  <input
                    x-model="a.approver"
                    class="mt-1 block h-9 w-40 rounded-md border border-white/15 bg-white/5 px-2 text-sm text-white"
                  />
                </label>
                <label class="flex-1 text-xs text-white/50">
                  Comment (optional)
                  <input
                    x-model="a.comment"
                    placeholder="Looks right, approving."
                    class="mt-1 block h-9 w-full rounded-md border border-white/15 bg-white/5 px-2 text-sm text-white placeholder-white/25"
                  />
                </label>
                <div class="flex gap-2">
                  <button
                    @click="decide(a, true)"
                    class="inline-flex h-9 items-center rounded-md bg-emerald-500/90 px-4 text-sm font-semibold text-white hover:bg-emerald-500"
                  >
                    Approve
                  </button>
                  <button
                    @click="decide(a, false)"
                    class="inline-flex h-9 items-center rounded-md border border-red-400/40 px-4 text-sm font-semibold text-red-300 hover:bg-red-500/10"
                  >
                    Reject
                  </button>
                </div>
              </div>

              <p x-show="a.approvalError" class="mt-2 text-xs text-red-300" x-text="a.approvalError"></p>
            </div>
          </li>
        </template>
      </ul>
    </div>

    <script>
      // Alpine component for the homepage root (`x-data="corridor()"` above).
      // NOTE: The browser calls the payments API same-origin, through the
      // gateway that fronts both webui and the API on one port — webui itself
      // never proxies this request, so no httpx/PAYMENTS_API_* config lives
      // server-side.
      function corridor() {
        return {
          anomalies: [],
          error: false,
          // Reactive tick bumped on resize and after each poll paint. Both the
          // overflow-dependent "Show more" toggle and the ago() relative
          // timestamps read it so they re-evaluate on each poll (and on resize).
          measureTick: 0,

          async refresh() {
            try {
              const response = await fetch("/api/payments/v1/anomalies");
              if (!response.ok) throw new Error(response.status);
              this.mergeAnomalies(await response.json());
              this.error = false;
              await this.loadPendingReviews();
            } catch (e) {
              this.error = true;
            }
          },

          // Reconciles the freshly-polled summaries onto the existing rows
          // in place, rather than replacing `anomalies` wholesale — a
          // wholesale replace would wipe the approval panel's client-only
          // state (the typed approver/comment, the already-fetched review,
          // any approval error) on every 3s poll.
          mergeAnomalies(rows) {
            const existing = new Map(this.anomalies.map((a) => [a.payment_id, a]));
            this.anomalies = rows.map((row) => {
              const a = existing.get(row.payment_id) || {
                approver: "operator",
                comment: "",
                review: null,
                anomaly: null,
                approvalError: "",
                rationaleExpanded: false,
                verdictExpanded: false,
                outcomeExpanded: false,
              };
              Object.assign(a, row);
              return a;
            });
          },

          // Fetches the pending review (proposal + verdict) for every row
          // still awaiting approval that hasn't loaded one yet. Runs after
          // each refresh() so a row that just turned awaiting-approval picks
          // up its review on the next poll.
          async loadPendingReviews() {
            for (const a of this.anomalies) {
              if (a.status === "awaiting-approval" && !a.review) {
                await this.loadReview(a);
              }
            }
          },

          async loadReview(a) {
            try {
              const response = await fetch(`/api/payments/v1/anomalies/${a.payment_id}`);
              if (!response.ok) throw new Error(response.status);
              const detail = await response.json();
              a.review = detail.review;
              a.anomaly = detail.anomaly;
            } catch (e) {
              // Leave review unset; the next poll retries.
            }
          },

          // Relays a human decision to the coordinator. NOTE: the approval
          // route only exists once the human-approval-signal FEATURE is
          // enabled (payments/api.py) — a non-2xx response (e.g. 404 while
          // the feature is off) is surfaced inline on the row instead of
          // thrown; the next poll reconciles the row's true state either
          // way.
          async decide(a, approved) {
            try {
              const response = await fetch(
                `/api/payments/v1/anomalies/${a.payment_id}/approval`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    approved,
                    approver: a.approver || "operator",
                    comment: a.comment || "",
                  }),
                },
              );
              a.approvalError = response.ok
                ? ""
                : `Could not record the decision (HTTP ${response.status}).`;
            } catch (e) {
              a.approvalError = "Could not record the decision — check your connection.";
            }
            await this.refresh();
          },

          init() {
            this.poll();
            // Outcome-toggle visibility depends on measured overflow, which is
            // not reactive; bump measureTick on resize and once after the first
            // paint so it re-checks against the real rendered layout.
            const bump = () => this.measureTick++;
            window.addEventListener("resize", bump);
            requestAnimationFrame(bump);
          },

          // Drives the periodic refresh with a self-chaining setTimeout
          // instead of setInterval: the next poll is scheduled only once the
          // current refresh() (fetch + merge + pending reviews) has settled,
          // so a slow cycle can never overlap with the next one.
          async poll() {
            await this.refresh();
            // Re-measure after the freshly-polled rows have painted.
            requestAnimationFrame(() => this.measureTick++);
            setTimeout(() => this.poll(), 3000);
          },

          // Maps a row's status to the Tailwind classes for its badge pill.
          // Unrecognized statuses (e.g. canceled, terminated, timed-out) fall
          // back to the same neutral treatment as "held".
          badge(status) {
            const palette = {
              "awaiting-approval": "bg-amber-400/15 text-amber-300 ring-amber-400/30",
              processing: "bg-accent/15 text-accent ring-accent/30",
              applied: "bg-emerald-400/15 text-emerald-300 ring-emerald-400/30",
              held: "bg-white/10 text-white/70 ring-white/15",
              failed: "bg-red-400/15 text-red-300 ring-red-400/30",
            };
            return palette[status] || "bg-white/10 text-white/70 ring-white/15";
          },

          // Drops a leading "<status> · " from the outcome summary when it just
          // repeats the status badge (e.g. "held · <reason>" -> "<reason>").
          outcomeText(a) {
            const summary = a.outcome_summary || "";
            const prefix = `${a.status} · `;
            return summary.startsWith(prefix) ? summary.slice(prefix.length) : summary;
          },

          // True when the (clamped) outcome paragraph immediately before `btnEl`
          // is taller than its clamp — i.e. the text is actually cut off, so a
          // Show more/less toggle is warranted. Reads measureTick so Alpine
          // re-evaluates it on resize and after each poll's paint.
          outcomeClamped(btnEl) {
            void this.measureTick;
            const p = btnEl.previousElementSibling;
            return !!p && p.scrollHeight > p.clientHeight + 1;
          },

          // Relative time since `start_time`, e.g. "8s ago" / "3m ago".
          ago(iso) {
            void this.measureTick; // re-evaluate on each poll tick (relative time)
            const seconds = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
            if (seconds < 60) return `${seconds}s ago`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
          },
        };
      }
    </script>
  </body>
</html>
