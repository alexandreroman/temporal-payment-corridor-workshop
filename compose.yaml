# Local development infrastructure — NOT for production.
#
# Runs the Temporal dev server (server, built-in database and Web UI in a
# single process) as a container. Payments and the starter run on the host
# via uv and connect to localhost:7233. Manage this with `make infra-up`.

services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      # Auto-configure the Web UI to reach the codec server through the
      # gateway. This is the browser-facing gateway URL (not an internal
      # Compose address): the browser, not the server, calls it.
      - --ui-codec-endpoint
      - http://localhost:8080/codec
      # Serve the Web UI under /temporal instead of the root path, so the
      # gateway can route `/` to our payment-corridor Web UI instead (see
      # gateway/Caddyfile).
      - --ui-public-path
      - /temporal
      # Pre-create one namespace per bounded context: payments and the
      # memory service never share a namespace.
      - --namespace
      - payments
      - --namespace
      - memory
      # Pre-register the custom Search Attributes used by the
      # search-attributes feature, so it works without a manual
      # `temporal operator search-attribute create` step.
      - --search-attribute
      - corridor=Keyword
      - --search-attribute
      - anomalyType=Keyword
      - --search-attribute
      - status=Keyword
    ports:
      - "7233:7233"  # gRPC endpoint for workers and clients
      # Web UI is not published directly: it is served through the gateway at
      # http://localhost:8080/temporal.
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  payments:
    build:
      context: .
      dockerfile: Dockerfile.payments
    # Optional so a fresh clone can `make dev` without first copying `.env`.
    env_file:
      - path: .env
        required: false
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      PAYMENTS_TEMPORAL_NAMESPACE: payments
      PAYMENTS_METRICS_HOST: 0.0.0.0
      PAYMENTS_METRICS_PORT: 9464
      # Reach the memory service over HTTP (its Compose service name + port).
      MEMORY_HOST: memory
      MEMORY_PORT: 8010
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9464/metrics')\""]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
      # The correction activities call the memory service over HTTP.
      memory:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  # The payments HTTP API (/api/payments/v1). Same image as the worker but runs
  # the API entry point; it is a Temporal client, not a Worker. Reached only
  # through the gateway (like codec) — it publishes no host port.
  payments-api:
    build:
      context: .
      dockerfile: Dockerfile.payments
    command: ["python", "-m", "payments.main_api"]
    env_file:
      - path: .env
        required: false
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      PAYMENTS_TEMPORAL_NAMESPACE: payments
      PAYMENTS_API_HOST: 0.0.0.0
      PAYMENTS_API_PORT: 8020
    expose:
      - "8020"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/healthz')\""]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  memory:
    build:
      context: .
      dockerfile: Dockerfile.memory
    # Optional so a fresh clone can `make dev` without first copying `.env`.
    env_file:
      - path: .env
        required: false
    environment:
      MEMORY_HOST: 0.0.0.0
      MEMORY_PORT: 8010
      # Only used when the memory-workflow FEATURE is enabled (the service then
      # runs an embedded worker on its own namespace); harmless otherwise.
      TEMPORAL_ADDRESS: temporal:7233
      MEMORY_TEMPORAL_NAMESPACE: memory
    ports:
      - "8010:8010" # http — corridor memory API (/api/memory/v1)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/healthz')\""]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      # Needed only when the memory-workflow FEATURE is enabled; harmless off.
      temporal:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  codec:
    build:
      context: .
      dockerfile: Dockerfile.codec
    env_file:
      - path: .env
        required: false
    environment:
      CODEC_SERVER_HOST: 0.0.0.0
      CODEC_SERVER_PORT: 8081
    # No published ports — reached only through the gateway (codec:8081 on the
    # compose network).
    # NOTE: The codec no longer fails fast on missing config. When
    # CODEC_ENCRYPTION_KEY / CODEC_SERVER_AUTH_TOKEN are unset it starts anyway
    # with an insecure built-in default and logs a warning, so `unless-stopped`
    # is safe (no crash loop) and it comes up with the stack whether or not
    # encryption is configured.
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # The gateway is the sole published HTTP entry point, on 8080 (Temporal Web
  # UI at /temporal, payment-corridor Web UI at /, codec at /codec, payments
  # API at /api/payments/v1). The Web UI is fully static, so the gateway
  # serves it directly from its mounted /srv volume rather than proxying to
  # a process. It intentionally does NOT depend on the codec service, so
  # `/codec` only 502s during the brief window before codec is up (or if it
  # is manually stopped) — codec itself always starts.
  gateway:
    image: caddy:2
    # Optional so a fresh clone can start without first copying `.env`.
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080" # http — single entry point: Web UI (/), Temporal Web UI (/temporal), payments API (/api/payments/v1), codec (/codec)
    # Lets the gateway reach a host-side payments API (used by the worktree
    # override's PAYMENTS_API_UPSTREAM); host.docker.internal resolves on Linux
    # via host-gateway and natively on macOS.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webui:/srv:ro
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
