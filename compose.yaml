# Local development infrastructure — NOT for production.
#
# Runs the Temporal dev server (server, built-in database and Web UI in a
# single process) as a container. The worker and starter run on the host
# via uv and connect to localhost:7233. Manage this with `make infra-up`.

services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
    ports:
      - "7233:7233"  # gRPC endpoint for workers and clients
      - "8233:8233"  # Web UI — http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # Optional so a fresh clone can `make dev` without first copying `.env`.
    env_file:
      - path: .env
        required: false
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_METRICS_HOST: 0.0.0.0
      WORKER_METRICS_PORT: 9464
    ports:
      - "9464:9464" # Prometheus/OpenMetrics — http://localhost:9464/metrics
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9464/metrics')\""]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    # Optional so a fresh clone can `make dev` without first copying `.env`.
    env_file:
      - path: .env
        required: false
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8000
    ports:
      - "8000:8000" # http — Web UI
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure
