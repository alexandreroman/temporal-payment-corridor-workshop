name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Verification only reads the source; no writes to the repo or registries.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Install uv and cache its download cache, keyed on uv.lock.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Install the exact locked resolution; fail if uv.lock is stale.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      # Quality gate: ruff lint + pytest (verifies the project imports and passes).
      - name: Lint and test
        run: make check
