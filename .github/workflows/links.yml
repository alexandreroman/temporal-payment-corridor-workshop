# Markdown link checker for EXTERNAL links (docs.temporal.io, ai.pydantic.dev,
# and the like). This is deliberately a SEPARATE workflow from ci.yml, not a
# step in the required `check` job: external links move or suffer transient
# outages, so a failure here must never block a merge the way the quality gate
# does. Internal links are covered deterministically by tools/test_guide.py in
# the main suite, so they are not this workflow's concern.
name: Links

on:
  # Only re-run on push/PR when the docs (or this checker) actually change;
  # the weekly schedule below still catches external link rot on unchanged
  # docs. paths: cannot be applied to the cron trigger, so it stays broad.
  push:
    branches: [main]
    paths:
      - README.md
      - guide/**
      - slides/**
      - .github/workflows/links.yml
  pull_request:
    branches: [main]
    paths:
      - README.md
      - guide/**
      - slides/**
      - .github/workflows/links.yml
  schedule:
    # Weekly sweep so external link rot surfaces even when nothing is pushed
    # (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"

# The checker only reads the docs; it needs no write access.
permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # Persist lychee's URL cache across runs so a green URL is not re-fetched
      # every time; keyed per-commit, restored from any prior cache.
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      # lychee checks the docs' links; tools/test_guide.py already covers the
      # internal ones, so the value here is the external URLs. --cache skips
      # recently-seen URLs; 429 (rate-limited) and 206 (partial content) still
      # count as reachable, and each URL is retried a few times before failing.
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --timeout 20
            --retry-wait-time 10
            --max-retries 3
            --accept 200,206,429
            README.md
            "guide/**/*.md"
            "slides/**/*.html"
          # Do not fail the job on a broken link: external link rot must never
          # turn this run red. Broken links are surfaced as a warning annotation
          # (see the next step) instead, keeping the job green while staying
          # visible in the run's summary and annotations.
          fail: false

      # Turn lychee's non-zero exit code (broken links present) into a warning
      # annotation. `exit_code` is the action's documented output; the job stays
      # green, but the annotation keeps the broken links visible.
      - name: Warn on broken links
        if: steps.lychee.outputs.exit_code != 0
        run: echo "::warning title=Broken links detected::lychee found broken links. See the job summary for the full report."
